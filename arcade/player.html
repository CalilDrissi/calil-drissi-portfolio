<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PS1 Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#7c4dff; --fg:#fff; --border:rgba(255,255,255,.14); --mono:'IBM Plex Mono','Courier New',monospace; }
  html, body { margin: 0; height: 100%; background: #000; }
  #game { width: 100%; height: 100%; }
  #msg { color: #ccc; font: 14px/1.5 var(--mono); padding: 1rem; }

  /* Loading + Start/Continue panels — match the main site (dark, mono, purple).
     They cover EmulatorJS's own chrome so the visitor only sees our UI. */
  .ar-panel{ position:fixed; inset:0; z-index:2147482000; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:22px; background:#0e0e0e; color:var(--fg);
    font-family:var(--mono); text-align:center; padding:24px; }
  .ar-panel.show{ display:flex; }
  .ar-eyebrow{ font-size:11px; text-transform:uppercase; letter-spacing:.16em; color:rgba(255,255,255,.4); }
  .ar-title{ font-size:clamp(18px,4vw,26px); font-weight:700; letter-spacing:.02em; }
  .ar-track{ width:min(340px,72vw); height:4px; border-radius:9999px; background:rgba(255,255,255,.12); overflow:hidden; }
  .ar-fill{ height:100%; width:40%; border-radius:9999px; background:var(--accent); animation:ar-load 1.15s ease-in-out infinite; }
  @keyframes ar-load{ 0%{ margin-left:-40%; } 100%{ margin-left:100%; } }
  .ar-fill.determinate{ animation:none; margin-left:0; transition:width .25s ease; }  /* real download % */
  .ar-hint{ font-size:11px; color:rgba(255,255,255,.4); letter-spacing:.04em; min-height:14px; }
  .ar-btns{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .ar-btn{ font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.05em;
    padding:12px 26px; border-radius:9999px; cursor:pointer; border:1px solid var(--border);
    background:rgba(255,255,255,.04); color:var(--fg); transition:background .2s,border-color .2s,transform .15s,filter .2s; }
  .ar-btn:hover{ transform:translateY(-1px); border-color:var(--accent); }
  .ar-btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 6px 20px rgba(124,77,255,.4); }
  .ar-btn.primary:hover{ filter:brightness(1.12); }

  /* In-game "Save progress" pill + toast. */
  #ar-save{ position:fixed; top:10px; left:10px; z-index:2147483000; display:none;
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#fff;
    background:rgba(18,18,20,.92); border:1px solid rgba(255,255,255,.45); border-radius:9999px; padding:8px 14px; cursor:pointer;
    transition:background .2s,border-color .2s; }
  #ar-save:hover{ background:#000; border-color:var(--accent); }
  #ar-toast{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%) translateY(20px); z-index:2147483002;
    background:var(--accent); color:#fff; font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    padding:9px 18px; border-radius:9999px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; }
  #ar-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="game"></div>

<!-- Site-styled loading + pre-game (Start / Continue) panels + Save button -->
<div id="ar-loading" class="ar-panel show">
  <div class="ar-eyebrow">Arcade</div>
  <div class="ar-title" id="ar-load-name">Loading…</div>
  <div class="ar-track"><div class="ar-fill"></div></div>
  <div class="ar-hint">Streaming the game…</div>
</div>
<div id="ar-pre" class="ar-panel">
  <div class="ar-eyebrow">Arcade</div>
  <div class="ar-title" id="ar-pre-name">Ready</div>
  <div class="ar-btns">
    <button class="ar-btn primary" id="ar-continue" type="button" style="display:none;">Continue</button>
    <button class="ar-btn" id="ar-start" type="button">Start</button>
  </div>
  <div class="ar-hint" id="ar-pre-hint"></div>
</div>
<button id="ar-save" type="button">Save progress</button>
<div id="ar-toast">Saved</div>

<script>
/*
 * player.html — boots EmulatorJS from URL params:
 *   ?rom=<absolute or relative URL>&name=<title>&core=<pcsx_rearmed|mednafen_psx_hw>
 *
 * This is the ONLY hard dependency the catalogue needs. It talks to the
 * EmulatorJS stable CDN and nothing else.
 */
(function () {
  var q    = new URLSearchParams(location.search);
  var rom  = q.get('rom');
  var name = q.get('name') || 'PlayStation Game';
  var core = q.get('core') || 'pcsx_rearmed';   // default to the light core

  if (!rom) {
    document.getElementById('game').innerHTML =
      '<p id="msg">No ROM specified.<br>Usage: player.html?rom=URL&name=Title&core=pcsx_rearmed|mednafen_psx_hw</p>';
    return;
  }

  // ---- BIOS (REQUIRED by the Quality core) --------------------------------
  // The Quality core (mednafen_psx_hw) has NO high-level BIOS — it needs a real
  // PS1 BIOS to run. Dump scph5501.bin from your own console, drop it in and set
  // BIOS_URL (relative path or an absolute URL on your object storage). Nothing
  // is bundled. The Performance core (pcsx_rearmed) does HLE and needs no BIOS.
  var BIOS_URL = '';   // <-- set to e.g. 'bios/scph5501.bin' to enable Quality

  // The Quality core has THREE hard requirements; if ANY is missing we fall back
  // to the software core so the game still boots instead of showing a broken
  // "Firmware is missing" / init error:
  //   1. WebGL2 (GPU renderer)
  //   2. SharedArrayBuffer — cross-origin isolation via COOP/COEP (see _headers)
  //   3. A BIOS (BIOS_URL above)
  function hasWebGL2() {
    try { return !!document.createElement('canvas').getContext('webgl2'); }
    catch (e) { return false; }
  }
  if (core === 'mednafen_psx_hw' && (!hasWebGL2() || !self.crossOriginIsolated || !BIOS_URL)) {
    core = 'pcsx_rearmed';
  }

  // Stable per-game ID so saves persist across visits and don't collide between
  // games. PS1 games write to a virtual memory card; EmulatorJS stores that (and
  // save-states) in IndexedDB keyed by EJS_gameID. Derived from the ROM URL so a
  // blob: URL (used by the ROM cache below) never changes the save key.
  function hashId(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
    return Math.abs(h) || 1;
  }
  var gameId = parseInt(q.get('id'), 10) || hashId(rom);

  // ---- Per-game PWA: install THIS game as its own home-screen app ---------
  // Each game gets a distinct manifest (unique id + start_url that boots the
  // game), so installing makes a separate app that launches straight into it.
  // The install button only appears in a top-level tab (browsers don't offer
  // install inside an iframe) — the catalogue's "Install" opens that tab.
  (function perGamePWA() {
    // Link a real-URL manifest (served by functions/arcade/manifest.js) so Chrome
    // reliably offers install — one distinct app per game (unique id + start_url).
    var link = document.createElement('link');
    link.rel = 'manifest';
    link.href = '/arcade/manifest?rom=' + encodeURIComponent(rom) +
      '&name=' + encodeURIComponent(name) + '&core=' + encodeURIComponent(core) +
      '&id=' + encodeURIComponent(gameId);
    document.head.appendChild(link);
    document.title = name;

    if (matchMedia('(display-mode: standalone)').matches) return;  // already installed/launched
    var deferred = null;
    var ib = document.createElement('button');
    ib.id = 'pwa-btn'; ib.type = 'button'; ib.textContent = 'Install game';
    ib.style.cssText = 'position:fixed;bottom:10px;left:10px;z-index:2147483000;display:none;' +
      'font:11px system-ui,sans-serif;letter-spacing:.02em;color:#fff;background:rgba(18,18,20,.92);' +
      'border:1px solid rgba(255,255,255,.45);border-radius:8px;padding:8px 12px;cursor:pointer;';
    ib.onmouseenter = function () { ib.style.background = '#000'; ib.style.borderColor = '#fff'; };
    ib.onmouseleave = function () { ib.style.background = 'rgba(18,18,20,.92)'; ib.style.borderColor = 'rgba(255,255,255,.45)'; };
    (document.body || document.documentElement).appendChild(ib);
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault(); deferred = e; ib.style.display = 'block';
    });
    ib.onclick = function () {
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.finally(function () { deferred = null; ib.style.display = 'none'; });
    };
    window.addEventListener('appinstalled', function () { ib.style.display = 'none'; });
  })();

  // ---- EmulatorJS configuration ------------------------------------------
  window.EJS_player      = '#game';
  window.EJS_core        = core;
  window.EJS_gameName    = name;
  window.EJS_gameID      = gameId;              // keeps memory-card saves + save-states persistent
  window.EJS_pathtodata  = 'https://cdn.emulatorjs.org/stable/data/';  // EmulatorJS stable CDN
  // Do NOT auto-start: inside the embedded popup iframe the audio (OpenAL) can't
  // initialise without a user gesture, which crashes the emulator start. Showing
  // EmulatorJS's own "Play" button means the click provides that gesture.
  window.EJS_startOnLoaded = false;
  // When the core + ROM are loaded, reveal our own Start/Continue panel (defined
  // below; hoisted, so this reference is valid even though it runs much later).
  window.EJS_ready = function () { if (typeof onArcadeReady === 'function') onArcadeReady(); };
  // EJS_gameUrl is set below, after the ROM cache resolves it.

  // Threaded cores need SharedArrayBuffer (cross-origin isolation). When the
  // player is embedded in the site's popup, the top page ISN'T isolated, so a
  // threaded core fails to init ("Error for site owner"). Only enable threads
  // when the page is actually isolated (e.g. opened standalone/fullscreen).
  window.EJS_threads = !!self.crossOriginIsolated;

  // Attach the BIOS if configured (required by the Quality core; harmless to the
  // Performance core). See BIOS_URL near the top of this script.
  if (BIOS_URL) window.EJS_biosUrl = BIOS_URL;

  // ---- Quality core tuning: GPU upscaling + PGXP -------------------------
  // These are the libretro beetle_psx_hw_* option keys used by mednafen_psx_hw.
  // If any value is ignored, open the devtools console: EmulatorJS logs the
  // exact supported option keys/values when the core starts.
  if (core === 'mednafen_psx_hw') {
    window.EJS_defaultOptions = {
      'beetle_psx_hw_renderer': 'hardware',            // GPU renderer
      'beetle_psx_hw_internal_resolution': '4x',       // upscale (1x native ... 16x)
      'beetle_psx_hw_pgxp_mode': 'memory + CPU',       // PGXP geometry correction
      'beetle_psx_hw_pgxp_texture': 'enabled'          // perspective-correct textures
    };
  }

  var host = document.getElementById('game');
  host.innerHTML = '<p id="msg">Loading…</p>';

  // Register the per-game ROM cache (sw.js). It streams the disc from the Cache
  // Storage API, so a game that has loaded once replays INSTANTLY and stays
  // cached until cleared per game. If the worker isn't controlling yet we just
  // load over the network (it caches for next time). Graceful everywhere.
  function ensureRomCache(){
    if (!('serviceWorker' in navigator)) return Promise.resolve();
    return navigator.serviceWorker.register('sw.js')
      .then(function(){ return navigator.serviceWorker.ready; })
      .then(function(){
        if (navigator.serviceWorker.controller) return;
        return new Promise(function(res){
          navigator.serviceWorker.addEventListener('controllerchange', res, { once: true });
          setTimeout(res, 2500);
        });
      })
      .catch(function(){});
  }
  // Store small ROMs in the cache directly (doesn't depend on the SW controlling
  // this first load). Next time, sw.js serves the byte-ranges from here -> instant.
  // Big discs (PS1) are skipped: caching+slicing them in memory would OOM the tab.
  function preCache(){
    if (!window.caches) return;
    var abs; try { abs = new URL(rom, location.href).href; } catch(_) { return; }
    caches.open('arcade-rom-cache-v1').then(function(cache){
      cache.match(abs, { ignoreVary: true }).then(function(hit){
        if (hit) return;
        fetch(abs, { method: 'HEAD' }).then(function(h){
          var size = +(h.headers.get('content-length') || 0);
          if (size && size <= 120 * 1024 * 1024) {
            fetch(abs).then(function(res){ if (res.ok && res.status === 200) cache.put(abs, res.clone()).catch(function(){}); });
          }
        }).catch(function(){});
      });
    }).catch(function(){});
  }

  ensureRomCache().then(function(){
    preCache();               // fire-and-forget; runs alongside the emulator load
    window.EJS_gameUrl = rom;
    var s = document.createElement('script');
    s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
    document.body.appendChild(s);
  });

  // Pause the game (stops audio) when the arcade window is hidden/minimized,
  // resume when it's shown again. Driven by the window manager via the catalogue.
  window.addEventListener('message', function (e) {
    if (!e.data) return;
    var em = window.EJS_emulator; if (!em) return;
    try {
      if (e.data.type === 'arcade-hide') { saveState(); if (typeof em.pause === 'function') em.pause(); }
      else if (e.data.type === 'arcade-show' && typeof em.play === 'function') em.play();
    } catch (_) {}
  });

  // ---- Loading bar + Start/Continue + Save progress ----------------------
  // The arcade is cross-origin-isolated, so the browser tears this iframe down
  // whenever the WM window is minimized. We can't keep the emulator alive, so we
  // autosave the game to localStorage (durable across visits) and offer a
  // "Continue" that reloads it. Manual "Save progress" + periodic autosave keep
  // it safe; "New game" starts fresh.
  var STATE_KEY = 'arcade:state:' + (function () {
    try { return new URL(rom, location.href).href; } catch (_) { return rom; }
  })();
  var MAX_STATE_B64 = 3 * 1024 * 1024;   // skip huge PS1 states (localStorage cap)
  var autosaveOn = false;
  function runningGM() { var em = window.EJS_emulator; return (em && em.started && em.gameManager) || null; }
  function hasSave() { try { return !!localStorage.getItem(STATE_KEY); } catch (_) { return false; } }
  function saveState() {
    var gm = runningGM(); if (!gm || typeof gm.getState !== 'function') return false;
    try {
      var u8 = gm.getState(); if (!u8 || !(u8.length || u8.byteLength)) return false;
      u8 = u8 instanceof Uint8Array ? u8 : new Uint8Array(u8);
      var bin = ''; for (var i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
      var b64 = btoa(bin); if (b64.length > MAX_STATE_B64) return false;
      localStorage.setItem(STATE_KEY, b64); return true;
    } catch (_) { return false; }
  }
  function loadSaved() {
    var gm = runningGM(); if (!gm || typeof gm.loadState !== 'function') return;
    var b64 = null; try { b64 = localStorage.getItem(STATE_KEY); } catch (_) {}
    if (!b64) return;
    try {
      var bin = atob(b64), u8 = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
      gm.loadState(u8);
    } catch (_) {}
  }

  var elLoading  = document.getElementById('ar-loading');
  var elPre      = document.getElementById('ar-pre');
  var elContinue = document.getElementById('ar-continue');
  var elStart    = document.getElementById('ar-start');
  var elSave     = document.getElementById('ar-save');
  var elToast    = document.getElementById('ar-toast');
  var elLoadName = document.getElementById('ar-load-name');
  var elPreName  = document.getElementById('ar-pre-name');
  var elPreHint  = document.getElementById('ar-pre-hint');
  if (elLoadName) elLoadName.textContent = name;
  if (elPreName)  elPreName.textContent = name;

  // ---- Game size (shown up front) + styled download progress -------------
  var sizeLabel = '';
  function fmtBytes(b) { if (!b) return ''; var mb = b / 1048576; return mb >= 1024 ? (mb / 1024).toFixed(1) + ' GB' : Math.round(mb) + ' MB'; }
  (function fetchSize() {
    var abs; try { abs = new URL(rom, location.href).href; } catch (_) { return; }
    fetch(abs, { method: 'HEAD' }).then(function (r) {
      sizeLabel = fmtBytes(+(r.headers.get('content-length') || 0));
      if (elPre && elPre.classList.contains('show')) setPreHint();  // refresh if already visible
    }).catch(function () {});
  })();
  function setPreHint() {
    if (!elPreHint) return;
    var parts = [];
    if (sizeLabel) parts.push(sizeLabel);
    parts.push(hasSave() ? 'Continue picks up your last save.' : 'First load streams the game.');
    elPreHint.textContent = parts.join('  ·  ');
  }
  var elFill     = document.querySelector('#ar-loading .ar-fill');
  var elLoadHint = document.querySelector('#ar-loading .ar-hint');
  function readEjsPercent() {                 // mirror EmulatorJS's real download %
    var host = document.getElementById('game');
    var m = host && /(\d{1,3})\s*%/.exec(host.textContent || '');
    return m ? Math.min(100, +m[1]) : null;
  }
  function showDownloadOverlay() {
    if (elFill) { elFill.classList.add('determinate'); elFill.style.width = '0%'; }
    if (elLoadHint) elLoadHint.textContent = 'Downloading…' + (sizeLabel ? '  ·  ' + sizeLabel : '');
    if (elLoading) elLoading.classList.add('show');
  }
  function updateDownloadOverlay(pct) {
    if (pct == null) return;
    if (elFill) elFill.style.width = pct + '%';
    if (elLoadHint) elLoadHint.textContent = (pct >= 100 ? 'Starting…' : 'Downloading ' + pct + '%') + (sizeLabel ? '  ·  ' + sizeLabel : '');
  }
  function clearDownloadOverlay() {
    if (elLoading) elLoading.classList.remove('show');
    if (elFill) { elFill.classList.remove('determinate'); elFill.style.width = ''; }
  }

  var toastT;
  function toast(msg) {
    if (!elToast) return;
    elToast.textContent = msg; elToast.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(function () { elToast.classList.remove('show'); }, 1600);
  }

  // Reveal the Start/Continue panel once the core + ROM are ready. Called by
  // window.EJS_ready, with a poll fallback in case that callback never fires.
  var readyShown = false;
  function onArcadeReady() {
    if (readyShown) return; readyShown = true;
    if (elLoading) elLoading.classList.remove('show');
    var resume = hasSave();
    if (elContinue) elContinue.style.display = resume ? '' : 'none';
    if (elStart) { elStart.textContent = resume ? 'New game' : 'Start'; elStart.classList.toggle('primary', !resume); }
    setPreHint();
    if (elPre) elPre.classList.add('show');
  }
  var readyPoll = setInterval(function () {
    if (readyShown) { clearInterval(readyPoll); return; }
    if (document.querySelector('#game .ejs_start_button')) onArcadeReady();
  }, 500);

  function beginPlay(restore) {
    if (elPre) elPre.classList.remove('show');
    showDownloadOverlay();                        // our styled bar covers EmulatorJS's plain text
    var btn = document.querySelector('#game .ejs_start_button');
    if (btn) btn.click();                        // click provides the audio gesture + boots the core
    var poll = setInterval(function () {
      updateDownloadOverlay(readEjsPercent());
      if (!runningGM()) return;
      clearInterval(poll);
      clearDownloadOverlay();
      if (restore) loadSaved();
      autosaveOn = true;
      if (elSave) elSave.style.display = 'block';
    }, 250);
  }
  if (elContinue) elContinue.addEventListener('click', function () { beginPlay(true); });
  if (elStart)    elStart.addEventListener('click', function () { beginPlay(false); });
  if (elSave)     elSave.addEventListener('click', function () { toast(saveState() ? 'Progress saved' : 'Save failed'); });

  setInterval(function () { if (autosaveOn) saveState(); }, 4000);
  window.addEventListener('pagehide', function () { if (autosaveOn) saveState(); });
  document.addEventListener('visibilitychange', function () { if (document.hidden && autosaveOn) saveState(); });
})();
</script>

<!-- ── Phone-as-controller: QR pairing + relay host + input injection ───────── -->
<style>
  #pc-btn{position:fixed;bottom:10px;right:10px;z-index:2147483000;
    font:11px system-ui,sans-serif;letter-spacing:.02em;color:#fff;background:rgba(18,18,20,.92);
    border:1px solid rgba(255,255,255,.45);border-radius:8px;padding:8px 12px;cursor:pointer;
    transition:background .2s,border-color .2s;}
  #pc-btn:hover{background:#000;border-color:#fff;}
  #pc-panel{position:fixed;top:8px;right:8px;z-index:2147483001;display:none;
    width:210px;background:#17171c;border:1px solid #2a2a32;border-radius:12px;
    padding:14px;color:#e8e8ea;font:13px system-ui,sans-serif;text-align:center;
    box-shadow:0 12px 40px rgba(0,0,0,.6);}
  #pc-panel.show{display:block;}
  #pc-panel h3{margin:0 0 8px;font-size:13px;font-weight:600;}
  #pc-qr{width:160px;height:160px;margin:0 auto 10px;background:#fff;border-radius:8px;padding:8px;}
  #pc-qr img,#pc-qr canvas{display:block;width:100%;height:100%;}
  #pc-state{font-size:11px;color:#9a9aa2;line-height:1.4;}
  #pc-state.on{color:#4ade80;}
  #pc-code{font-family:ui-monospace,monospace;letter-spacing:.15em;color:#fff;}
  #pc-close{position:absolute;top:6px;right:9px;cursor:pointer;color:#9a9aa2;font-size:15px;}
</style>
<button id="pc-btn" type="button">Phone controller</button>
<div id="pc-panel">
  <span id="pc-close">✕</span>
  <h3>Play with your phone</h3>
  <div id="pc-qr"></div>
  <div id="pc-state">Scan with your phone camera.<br>Room <span id="pc-code"></span></div>
</div>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
<script>
(function(){
  var CHARS = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';   // no ambiguous 0/O/1/I/L
  var room = ''; for (var i=0;i<4;i++) room += CHARS[Math.floor(Math.random()*CHARS.length)];

  var btn = document.getElementById('pc-btn');
  var panel = document.getElementById('pc-panel');
  var stateEl = document.getElementById('pc-state');
  var qrDone = false, ws = null, closed = false, retry = 0;

  document.getElementById('pc-code').textContent = room;
  document.getElementById('pc-close').onclick = function(){ panel.classList.remove('show'); btn.style.display=''; };
  btn.onclick = function(){ panel.classList.add('show'); btn.style.display='none'; start(); };

  // Tell the phone pad which console layout to show (Game Boy has fewer buttons
  // than PlayStation, etc.).
  function sysForCore(c){
    if (/desmume|melonds|nds/.test(c)) return 'nds';
    if (/gambatte|gb/.test(c)) return 'gb';
    if (/gba|mgba|vba/.test(c)) return 'gba';
    if (/snes|snes9x/.test(c)) return 'snes';
    if (/nes|fceumm|nestopia/.test(c)) return 'nes';
    return 'psx';
  }
  function start(){
    if (!qrDone && window.QRCode) {
      var sys = sysForCore((new URLSearchParams(location.search).get('core') || '').toLowerCase());
      new QRCode(document.getElementById('pc-qr'), {
        text: location.origin + '/arcade/pad.html?room=' + room + '&sys=' + sys,
        width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M
      });
      qrDone = true;
    }
    if (!ws) connect();
  }

  // EmulatorJS input injection — same call its own on-screen pad uses.
  function gm(){ try { return window.EJS_emulator && EJS_emulator.gameManager; } catch(_){ return null; } }
  function inject(m){ var g = gm(); if (g && typeof g.simulateInput === 'function') g.simulateInput(0, m.i|0, m.v ? 1 : 0); }

  function setState(on, html){ stateEl.classList.toggle('on', !!on); stateEl.innerHTML = html; }

  function connect(){
    ws = new WebSocket('wss://khalil-arcade-relay.khalil-drissi.workers.dev/?room=' + room + '&role=host');
    ws.onopen = function(){ retry = 0; setState(false, 'Waiting for phone… Room <span id="pc-code">'+room+'</span>'); };
    ws.onmessage = function(e){
      var m; try { m = JSON.parse(e.data); } catch(_){ return; }
      if (m.t === 'b') inject(m);
      else if (m.t === 'peer') setState(m.state === 'connected', m.state === 'connected' ? '📱 Phone connected' : 'Phone disconnected');
    };
    ws.onclose = function(){ if (closed) return; retry = Math.min(retry+1, 6); setTimeout(connect, 400*retry); };
    ws.onerror  = function(){ try{ ws.close(); }catch(_){} };
  }
  window.addEventListener('pagehide', function(){ closed = true; try{ ws && ws.close(); }catch(_){} });
})();
</script>
